<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Emerge Cockpit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #ccc; font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 14px; color: #e6edf3; }
.session-info { font-size: 11px; color: #8b949e; margin-left: auto; }
.thresholds-bar { background: #0d1117; border-bottom: 1px solid #21262d; padding: 6px 16px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 11px; color: #8b949e; }
.thresholds-bar span b { color: #79c0ff; }
.tabs { display: flex; border-bottom: 1px solid #30363d; background: #161b22; overflow-x: auto; flex-shrink: 0; }
.tabs::-webkit-scrollbar { height: 3px; }
.tabs::-webkit-scrollbar-thumb { background: #30363d; }
.tab { padding: 8px 16px; cursor: pointer; font-size: 12px; color: #8b949e; border-bottom: 2px solid transparent; white-space: nowrap; flex-shrink: 0; }
.tab.active { color: #e6edf3; border-bottom-color: #58a6ff; }
.tab .warn { color: #f85149; margin-left: 4px; }
.layout { display: flex; height: calc(100vh - 130px); }
.main-panel { flex: 1; overflow-y: auto; padding: 12px 16px 28px; }
.queue-panel { width: 300px; border-left: 1px solid #21262d; display: flex; flex-direction: column; }
.queue-header { padding: 10px 14px; font-size: 11px; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #21262d; flex-shrink: 0; }
.queue-items { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.queue-item { background: #0d1a0d; border: 1px solid #2a4a2a; border-radius: 4px; padding: 6px 8px; font-size: 11px; display: flex; align-items: flex-start; gap: 6px; }
.queue-item.delete { background: #1a0d0d; border-color: #4a1a1a; }
.queue-item .action-label { flex: 1; }
.queue-item .action-label b { color: #58a6ff; display: block; }
.queue-item .action-label b.del { color: #f85149; }
.queue-item .action-label b.promote { color: #3fb950; }
.queue-item .action-label span { color: #8b949e; font-size: 10px; }
.queue-item button.remove { background: none; border: none; color: #484f58; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.queue-item button.remove:hover { color: #f85149; }
.queue-footer { padding: 10px 12px; border-top: 1px solid #21262d; flex-shrink: 0; }
.submit-btn { width: 100%; padding: 8px; background: #1a3a2a; border: 1px solid #3fb950; border-radius: 5px; color: #3fb950; font-size: 13px; font-weight: 600; cursor: pointer; }
.submit-btn:hover { background: #2a4a3a; }
.submit-btn:disabled { opacity: 0.4; cursor: default; }
.clear-btn { width: 100%; padding: 4px; background: none; border: none; color: #484f58; font-size: 11px; cursor: pointer; margin-top: 4px; }
/* Section headers inside connector tab */
.sec-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #484f58; margin: 16px 0 6px; display: flex; align-items: center; gap: 8px; }
.sec-label:first-child { margin-top: 0; }
.sec-label .sec-count { color: #8b949e; }
/* Overview section headers */
.section-header { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 6px; }
.section-header.critical { color: #f85149; }
.section-header.canary { color: #d29922; }
.section-header.stable { color: #3fb950; }
.section-header.explore { color: #8b949e; }
/* Pipeline cards */
.pipeline-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin-bottom: 4px; }
.pipeline-card.critical { border-left: 3px solid #f85149; }
.pipeline-card.canary { border-left: 3px solid #d29922; }
.pipeline-card.stable { border-left: 3px solid #3fb950; }
.pipeline-card.queued { opacity: 0.6; }
.pipeline-card-row { display: flex; align-items: center; gap: 8px; }
.pipeline-key { flex: 1; font-size: 12px; color: #e6edf3; word-break: break-all; }
.pipeline-badge { padding: 1px 7px; border-radius: 10px; font-size: 10px; flex-shrink: 0; }
.badge-stable { background: #1b2d1b; color: #3fb950; border: 1px solid #2a4a2a; }
.badge-canary { background: #2d2208; color: #d29922; border: 1px solid #4a3a10; }
.badge-explore { background: #1c2128; color: #8b949e; border: 1px solid #30363d; }
.pipeline-desc { font-size: 10px; color: #6e7681; margin-top: 2px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pipeline-metrics { font-size: 10px; color: #8b949e; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.pipeline-metrics .warn { color: #f85149; }
.pipeline-metrics .good { color: #3fb950; }
.pipeline-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.act-btn { padding: 2px 8px; font-size: 10px; border-radius: 3px; cursor: pointer; border: 1px solid #30363d; background: #1c2128; color: #8b949e; white-space: nowrap; }
.act-btn:hover { border-color: #58a6ff; color: #58a6ff; }
.act-btn.promote { border-color: #2a4a2a; color: #3fb950; }
.act-btn.promote:hover { background: #1b2d1b; }
.act-btn.demote { border-color: #4a3a10; color: #d29922; }
.act-btn.demote:hover { background: #2d2208; }
.act-btn.danger { border-color: #4a1a1a; color: #f85149; }
.act-btn.danger:hover { background: #1a0d0d; }
/* Notes */
.notes-block { background: #0d1117; border: 1px solid #1b2d1b; border-radius: 4px; padding: 8px 10px; font-size: 11px; color: #8b949e; white-space: pre-wrap; margin-bottom: 6px; max-height: 200px; overflow-y: auto; }
.notes-actions { display: flex; gap: 6px; margin-bottom: 4px; }
.btn-sm { padding: 3px 10px; font-size: 11px; background: #1c2128; border: 1px solid #30363d; border-radius: 3px; color: #8b949e; cursor: pointer; }
.btn-sm:hover { border-color: #58a6ff; color: #58a6ff; }
/* Inline comment form */
.comment-form { display: none; margin-top: 6px; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 8px; }
.comment-form textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #ccc; border-radius: 3px; padding: 6px 8px; font-size: 11px; font-family: inherit; resize: vertical; min-height: 60px; }
.comment-form textarea:focus { outline: none; border-color: #58a6ff; }
.comment-form-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }
/* Scenario cards */
.scenario-card { background: #0d1117; border: 1px solid #1a2a3a; border-radius: 4px; padding: 7px 10px; margin-bottom: 5px; }
.scenario-card-row { display: flex; align-items: flex-start; gap: 8px; }
.scenario-info { flex: 1; }
.scenario-name { font-size: 12px; color: #e6edf3; font-weight: 600; }
.scenario-desc { font-size: 10px; color: #8b949e; margin-top: 2px; }
.scenario-meta { font-size: 10px; color: #484f58; margin-top: 2px; }
.add-btn { padding: 3px 10px; background: #1a2a3a; border: 1px solid #58a6ff; border-radius: 3px; color: #58a6ff; font-size: 11px; cursor: pointer; flex-shrink: 0; }
.add-btn:hover { background: #1f3a5a; }
/* Scenario arg form */
.scenario-args-form { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1a2a3a; }
.arg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.arg-row label { font-size: 10px; color: #58a6ff; width: 120px; flex-shrink: 0; }
.arg-row input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #ccc; border-radius: 3px; padding: 4px 7px; font-size: 11px; font-family: inherit; }
.arg-row input:focus { outline: none; border-color: #58a6ff; }
.arg-row input.secret { color: #484f58; font-style: italic; }
.scenario-form-actions { display: flex; gap: 6px; justify-content: flex-end; }
/* Component slots */
.component-slot { border: 1px dashed #30363d; border-radius: 4px; padding: 6px; margin-bottom: 8px; }
.component-slot iframe { width: 100%; border: none; min-height: 200px; }
.component-label { font-size: 10px; color: #484f58; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
/* Status bar */
.status-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 22px; background: #161b22; border-top: 1px solid #21262d; display: flex; align-items: center; padding: 0 12px; font-size: 10px; color: #8b949e; gap: 16px; z-index: 10; }
/* Overview dashboard */
.overview-grid { display: grid; grid-template-columns: 230px 1fr; gap: 12px; margin-bottom: 14px; align-items: start; }
.overview-donut-wrap { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.donut-legend { width: 100%; display: flex; flex-direction: column; gap: 4px; }
.donut-legend-row { display: flex; align-items: center; gap: 7px; font-size: 11px; cursor: pointer; }
.donut-legend-row:hover { color: #e6edf3; }
.donut-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.donut-legend-label { flex: 1; color: #8b949e; }
.donut-legend-val { color: #e6edf3; font-weight: 600; }
.overview-stats { display: grid; grid-template-columns: repeat(4, minmax(130px, 1fr)); gap: 8px; }
.stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 9px 10px; min-height: 78px; display: flex; flex-direction: column; justify-content: center; }
.stat-card.critical { border-color: #4a1a1a; }
.stat-card.canary  { border-color: #4a3a10; }
.stat-card.stable  { border-color: #2a4a2a; }
.stat-card.span-2 { grid-column: span 2; }
.stat-num  { font-size: 26px; font-weight: 700; line-height: 1; }
.stat-num.critical { color: #f85149; }
.stat-num.canary   { color: #d29922; }
.stat-num.stable   { color: #3fb950; }
.stat-num.neutral  { color: #8b949e; }
.stat-label { font-size: 10px; color: #484f58; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }
.stat-sub   { font-size: 10px; color: #8b949e; margin-top: 5px; }
.stat-dist { margin-top: 8px; height: 8px; border-radius: 99px; overflow: hidden; display: flex; background: #0d1117; border: 1px solid #21262d; }
.stat-dist > span { height: 100%; display: inline-block; min-width: 2px; }
.stat-dist .critical { background: #f85149; }
.stat-dist .canary { background: #d29922; }
.stat-dist .stable { background: #3fb950; }
.stat-dist .explore { background: #484f58; }
.conn-load { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.conn-load-row { display: flex; align-items: center; gap: 6px; font-size: 10px; }
.conn-load-name { width: 72px; color: #8b949e; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.conn-load-bar-wrap { flex: 1; height: 7px; border-radius: 99px; overflow: hidden; background: #0d1117; border: 1px solid #21262d; }
.conn-load-bar { height: 100%; background: #1f6feb; }
.conn-load-val { width: 22px; text-align: right; color: #e6edf3; font-size: 10px; }
@media (max-width: 1450px) {
  .overview-stats { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
  .stat-card.span-2 { grid-column: span 2; }
}
.explore-summary { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 10px 12px; }
.explore-title { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
.explore-connectors { display: flex; flex-wrap: wrap; gap: 6px; }
.explore-chip { background: #1c2128; border: 1px solid #30363d; border-radius: 12px; padding: 2px 9px; font-size: 10px; color: #8b949e; cursor: pointer; }
.explore-chip:hover { border-color: #58a6ff; color: #58a6ff; }
.explore-chip b { color: #e6edf3; }
/* Pipeline key breakdown badges */
.key-parts { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; overflow: hidden; }
.key-connector { padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: 700; flex-shrink: 0; letter-spacing: 0.3px; }
.key-mode { padding: 1px 5px; border-radius: 3px; font-size: 10px; flex-shrink: 0; }
.key-mode.read  { background: #0d1f2d; color: #58a6ff; border: 1px solid #1a3a5a; }
.key-mode.write { background: #1f1200; color: #d29922; border: 1px solid #4a3a10; }
.key-name { font-size: 12px; color: #e6edf3; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* Connector group sub-header inside overview sections */
.conn-group { margin-top: 10px; }
.conn-group:first-child { margin-top: 0; }
.conn-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; padding: 2px 0; }
.conn-group-name { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 1px 7px; border-radius: 3px; }
.conn-group-count { font-size: 10px; color: #484f58; }
</style>
</head>
<body>

<div class="header">
  <h1>🌀 Emerge Cockpit</h1>
  <span class="session-info" id="session-info">loading...</span>
</div>

<div class="thresholds-bar" id="thresholds-bar">loading thresholds...</div>

<div class="tabs" id="tabs-bar"><div class="tab active">Overview</div></div>

<div class="layout">
  <div class="main-panel" id="main-panel">loading...</div>
  <div class="queue-panel">
    <div class="queue-header">📋 待提交操作 (<span id="queue-count">0</span>)</div>
    <div class="queue-items" id="queue-items"></div>
    <div class="queue-footer">
      <button class="submit-btn" id="submit-btn" onclick="submitQueue()" disabled>✓ 提交给 CC 执行 (0)</button>
      <button class="clear-btn" onclick="clearQueue()">清空队列</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-msg">就绪</span>
  <span id="last-refresh"></span>
</div>

<script>
// ── Pipeline key helpers ──────────────────────────────────────────────────────
function parseKey(key) {
  // key format: <connector>.<mode>.<name>  (mode = read | write)
  const parts = (key || '').split('.');
  return {
    connector: parts[0] || '',
    mode: parts[1] || '',
    name: parts.slice(2).join('.') || parts[0] || key,
  };
}

// Derive a stable hue (0–360) from a connector name for consistent coloring
function connectorHue(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  // Avoid red/orange range (0–40, 340–360) reserved for critical/canary status
  const hue = 60 + (h % 240);  // 60–300: green→blue→purple range
  return hue;
}

function connectorStyle(name) {
  const hue = connectorHue(name);
  return `background:hsl(${hue},30%,12%);color:hsl(${hue},70%,65%);border:1px solid hsl(${hue},30%,22%)`;
}

function renderKeyParts(key, hideConnector) {
  const { connector, mode, name } = parseKey(key);
  const connBadge = hideConnector || !connector ? '' :
    `<span class="key-connector" style="${connectorStyle(connector)}">${escHtml(connector)}</span>`;
  const modeBadge = mode ?
    `<span class="key-mode ${escHtml(mode)}">${escHtml(mode)}</span>` : '';
  return `<div class="key-parts">${connBadge}${modeBadge}<span class="key-name">${escHtml(name)}</span></div>`;
}

// Group a list of pipelines by connector, preserving insertion order of connectors
function groupByConnector(pipelines) {
  const map = new Map();
  pipelines.forEach(p => {
    const conn = parseKey(p.key || '').connector || 'unknown';
    if (!map.has(conn)) map.set(conn, []);
    map.get(conn).push(p);
  });
  return map;
}

// ── State ────────────────────────────────────────────────────────────────────
let policyData = null;
let assetsData = null;
let queue = [];
let currentTab = 'overview';
let queueIdSeq = 0;

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([refreshPolicy(), refreshAssets()]);
  renderTabs();
  renderCurrentTab();
  setInterval(refreshPolicy, 5000);
}

async function refreshPolicy() {
  try {
    const r = await fetch('/api/policy');
    policyData = await r.json();
    renderThresholds();
    renderTabs();
    renderCurrentTab();
    document.getElementById('last-refresh').textContent = '刷新: ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('status-msg').textContent = '连接失败: ' + e.message;
  }
}

async function refreshAssets() {
  try {
    const r = await fetch('/api/assets');
    assetsData = await r.json();
    renderTabs();
    renderCurrentTab();
  } catch(e) {}
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  const connectors = assetsData ? Object.keys(assetsData.connectors || {}) : [];
  const threshold = policyData ? (policyData.thresholds?.rollback_consecutive_failures || 2) : 2;
  const allPipelines = policyData ? (policyData.pipelines || []) : [];

  let html = `<div class="tab ${currentTab === 'overview' ? 'active' : ''}" onclick="switchTab('overview')">Overview</div>`;

  connectors.forEach(name => {
    const connPipelines = allPipelines.filter(p => (p.key || '').includes(name));
    const hasCritical = connPipelines.some(p => (p.consecutive_failures || 0) >= threshold);
    const warn = hasCritical ? '<span class="warn">⚠</span>' : '';
    html += `<div class="tab ${currentTab === name ? 'active' : ''}" onclick="switchTab('${name.replace(/'/g, "\\'")}')">${escHtml(name)}${warn}</div>`;
  });

  document.getElementById('tabs-bar').innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  renderTabs();
  renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === 'overview') renderOverviewTab();
  else renderConnectorTab(currentTab);
}

// ── Thresholds bar ────────────────────────────────────────────────────────────
function renderThresholds() {
  if (!policyData) return;
  const t = policyData.thresholds || {};
  const bar = document.getElementById('thresholds-bar');
  bar.innerHTML = [
    `promote success≥<b>${t.promote_min_success_rate}</b>`,
    `verify≥<b>${t.promote_min_verify_rate}</b>`,
    `attempts≥<b>${t.promote_min_attempts}</b>`,
    `rollback_failures=<b>${t.rollback_consecutive_failures}</b>`,
    `stable_attempts≥<b>${t.stable_min_attempts}</b>`,
  ].map(s => `<span>${s}</span>`).join('');
  document.getElementById('session-info').textContent =
    `Session: ${(policyData.session_id || '').slice(0, 20)} · Goal: ${policyData.goal || 'unset'}`;
}

// ── Overview tab (dashboard: donut chart + stat cards + pipeline cards) ────────
function renderOverviewTab() {
  if (!policyData) return;
  const pipelines = policyData.pipelines || [];
  const threshold = policyData.thresholds ? (policyData.thresholds.rollback_consecutive_failures || 2) : 2;
  const groups = { critical: [], canary: [], stable: [], explore: [] };
  pipelines.forEach(p => {
    if ((p.consecutive_failures || 0) >= threshold) groups.critical.push(p);
    else if (p.status === 'canary') groups.canary.push(p);
    else if (p.status === 'stable') groups.stable.push(p);
    else groups.explore.push(p);
  });

  const total = pipelines.length;
  const queuedKeys = new Set(queue.map(q => q.data && q.data.key).filter(Boolean));

  // ── Avg success rate across stable+canary ──
  const tracked = [...groups.stable, ...groups.canary];
  let avgRate = null;
  if (tracked.length) {
    const sum = tracked.reduce((s, p) => {
      const r = p.success_rate != null ? p.success_rate : (p.total_runs > 0 ? (p.total_runs - (p.total_failures || 0)) / p.total_runs : null);
      return r != null ? [s[0] + r, s[1] + 1] : s;
    }, [0, 0]);
    if (sum[1]) avgRate = (sum[0] / sum[1] * 100).toFixed(1);
  }
  let avgVerify = null;
  if (tracked.length) {
    const v = tracked.reduce((s, p) => {
      const r = p.verify_rate != null ? p.verify_rate : null;
      return r != null ? [s[0] + r, s[1] + 1] : s;
    }, [0, 0]);
    if (v[1]) avgVerify = (v[0] / v[1] * 100).toFixed(1);
  }

  // ── Explore: aggregate by connector ──
  const connectorMap = {};
  groups.explore.forEach(p => {
    const parts = (p.key || '').split('.');
    const conn = parts[0] || 'unknown';
    connectorMap[conn] = (connectorMap[conn] || 0) + 1;
  });
  const loadMap = {};
  pipelines.forEach(p => {
    const conn = parseKey(p.key || '').connector || 'unknown';
    loadMap[conn] = (loadMap[conn] || 0) + 1;
  });
  const topLoad = Object.entries(loadMap).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const maxLoad = topLoad.length ? topLoad[0][1] : 1;
  const totalRollbacks = pipelines.reduce((s, p) => s + (p.rollback_executed_count || 0), 0);
  const totalFailures = pipelines.reduce((s, p) => s + (p.consecutive_failures || 0), 0);
  const queueCount = queue.length;

  // ── Build HTML ──
  const critColor = '#f85149', canaryColor = '#d29922', stableColor = '#3fb950', exploreColor = '#484f58';

  // Stat cards
  const statCritClass = groups.critical.length ? ' critical' : '';
  const statCanaryClass = groups.canary.length ? ' canary' : '';
  const statStableClass = groups.stable.length ? ' stable' : '';

  let html = `<div class="overview-grid">
    <div class="overview-donut-wrap">
      <canvas id="overview-donut" width="160" height="160"></canvas>
      <div class="donut-legend">
        <div class="donut-legend-row" onclick="document.getElementById('ov-sec-critical').scrollIntoView({behavior:'smooth'})">
          <span class="donut-dot" style="background:${critColor}"></span>
          <span class="donut-legend-label">Critical</span>
          <span class="donut-legend-val">${groups.critical.length}</span>
        </div>
        <div class="donut-legend-row" onclick="document.getElementById('ov-sec-canary').scrollIntoView({behavior:'smooth'})">
          <span class="donut-dot" style="background:${canaryColor}"></span>
          <span class="donut-legend-label">Canary</span>

      html += `<div class="conn-group">

          </div>
        </div>`;
      });
      html += `</div>`;
    });

  // ── Explore section (aggregate chips — only known connector tabs are clickable) ──
  html += `<div id="ov-sec-explore"></div>`;
  if (groups.explore.length) {
    html += `<div class="section-header explore">◯ Explore (${groups.explore.length})</div>`;
    const knownConnectors = new Set(Object.keys((assetsData && assetsData.connectors) || {}));
    const connEntries = Object.entries(connectorMap).sort((a, b) => b[1] - a[1]);
    // Split: known connectors get clickable chips; unknown prefixes aggregate into "other"
    const knownChips = connEntries.filter(([c]) => knownConnectors.has(c));
    const otherCount = connEntries.filter(([c]) => !knownConnectors.has(c)).reduce((s, [, n]) => s + n, 0);
    html += `<div class="explore-summary">
      <div class="explore-title">Explore pipelines by connector — click to navigate</div>
      <div class="explore-connectors">`;
    knownChips.forEach(([conn, cnt]) => {
      html += `<span class="explore-chip" onclick="switchTab('${escHtml(conn).replace(/'/g,"\\'")}')"><b>${escHtml(cnt.toString())}</b> ${escHtml(conn)}</span>`;
    });
    if (otherCount > 0) {
      html += `<span class="explore-chip" style="opacity:0.45;cursor:default" title="Pipelines whose key prefix is not a registered connector"><b>${otherCount}</b> other</span>`;
    }
    html += `</div></div>`;
  }

  if (!total) html = '<div style="color:#8b949e;padding:20px">No pipelines found.</div>';
  document.getElementById('main-panel').innerHTML = html;

  // ── Draw donut chart on canvas ──
  requestAnimationFrame(() => {
    const canvas = document.getElementById('overview-donut');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = 80, cy = 80, outerR = 72, innerR = 44;
    const slices = [
      { val: groups.critical.length, color: critColor },
      { val: groups.canary.length,   color: canaryColor },
      { val: groups.stable.length,   color: stableColor },
      { val: groups.explore.length,  color: exploreColor },
    ].filter(s => s.val > 0);

    ctx.clearRect(0, 0, 160, 160);

    if (!slices.length) {
      // Empty state circle
      ctx.beginPath();
      ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
      ctx.strokeStyle = '#21262d';
      ctx.lineWidth = outerR - innerR;
      ctx.stroke();
    } else {
      const total2 = slices.reduce((s, sl) => s + sl.val, 0);
      let startAngle = -Math.PI / 2;
      const gap = slices.length > 1 ? 0.03 : 0;
      slices.forEach(sl => {
        const sweep = (sl.val / total2) * Math.PI * 2 - gap;
        ctx.beginPath();
        ctx.moveTo(cx + innerR * Math.cos(startAngle + gap / 2), cy + innerR * Math.sin(startAngle + gap / 2));
        ctx.arc(cx, cy, outerR, startAngle + gap / 2, startAngle + gap / 2 + sweep);
        ctx.arc(cx, cy, innerR, startAngle + gap / 2 + sweep, startAngle + gap / 2, true);
        ctx.closePath();
        ctx.fillStyle = sl.color;
        ctx.fill();
        startAngle += sweep + gap;
      });
    }

    // Center label
    ctx.fillStyle = '#e6edf3';
    ctx.font = 'bold 22px SF Mono, Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(total, cx, cy - 7);
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px SF Mono, Consolas, monospace';
    ctx.fillText('pipelines', cx, cy + 11);
  });
}

// ── Single connector tab ──────────────────────────────────────────────────────
function renderConnectorTab(name) {
  if (!assetsData) {
    document.getElementById('main-panel').innerHTML = '<div style="color:#8b949e;padding:20px">Loading assets...</div>';
    return;
  }
  const c = (assetsData.connectors || {})[name];
  if (!c) {
    document.getElementById('main-panel').innerHTML = `<div style="color:#8b949e;padding:20px">Connector "${escHtml(name)}" not found.</div>`;
    return;
  }
  const allPipelines = policyData ? (policyData.pipelines || []) : [];
  const connPipelines = allPipelines.filter(p => (p.key || '').includes(name));
  const queuedKeys = new Set(queue.map(q => q.data && q.data.key).filter(Boolean));
  const safeN = name.replace(/'/g, "\\'");

  let html = '';

  // ── NOTES ──
  if (c.notes) {
    html += `<div class="sec-label">Notes <span class="sec-count">${c.notes.length > 600 ? '(truncated)' : ''}</span></div>
    <div class="notes-block">${escHtml(c.notes.slice(0, 800))}${c.notes.length > 800 ? '\n...' : ''}</div>
    <div class="notes-actions">
      <button class="btn-sm" onclick="queueNotesComment('${safeN}')">+ Add comment</button>

        <button class="btn-sm" style="border-color:#58a6ff;color:#58a6ff" onclick="submitNotesComment('${safeN}')">Add comment</button>

    </div>`;
  }

  // ── PIPELINES ──
  html += `<div class="sec-label">Pipelines <span class="sec-count">${connPipelines.length}</span></div>`;
  if (connPipelines.length) {
    connPipelines.forEach(p => { html += renderPipelineCard(p, queuedKeys, { hideConnector: true }); });
  } else {
    html += `<div style="color:#484f58;font-size:11px;padding:6px 0">No pipelines for this connector.</div>`;
  }

  // ── CONTROLS (Scenarios + injected components) ──
  const hasControls = (c.scenarios && c.scenarios.length) || (c.components && c.components.length);
  if (hasControls) {

    if (c.scenarios && c.scenarios.length) {

          <div class="scenario-card-row">
            <div class="scenario-info">
              <div class="scenario-name">${escHtml(s.name)}</div>

              <div class="scenario-meta">${s.step_count} steps${s.has_rollback ? ' · has rollback' : ''}${s.required_args && s.required_args.length ? ' · args: ' + escHtml(s.required_args.join(', ')) : ''}</div>
            </div>
            <button class="add-btn" onclick="toggleScenarioForm('${formId}','${safeN}','${escHtml(s.name).replace(/'/g,"\\'")}',${argsJson})">▶ Run</button>
          </div>
          <div class="scenario-args-form" id="${formId}"></div>
        </div>`;
      });
    }

    if (c.components && c.components.length) {
      c.components.forEach(comp => {
        html += `<div class="component-slot">
          <div class="component-label">📦 ${escHtml(comp.filename)} <span>${escHtml((comp.context || '').slice(0, 80))}</span></div>
          <iframe src="/api/components/${encodeURIComponent(name)}/${encodeURIComponent(comp.filename)}" onload="resizeIframe(this)"></iframe>

// ── Pipeline card ─────────────────────────────────────────────────────────────
function renderPipelineCard(p, queuedKeys, opts) {
  // opts: { hideConnector: bool }
  const key = p.key || '';
  const status = p.status || 'explore';
  const isQueued = queuedKeys.has(key);
  const cf = p.consecutive_failures || 0;
  const sr = p.success_rate != null ? p.success_rate.toFixed(2) : '?';
  const vr = p.verify_rate != null ? p.verify_rate.toFixed(2) : '?';
  const actionDefs = {
    explore: [
      { action: 'promote-canary', label: '→ canary', cls: 'promote' },
      { action: 'reset-failures', label: 'reset ⚠', cls: '' },
      { action: 'delete',         label: 'delete',   cls: 'danger' },
    ],
    canary: [
      { action: 'promote-stable', label: '→ stable',  cls: 'promote' },
      { action: 'demote-explore', label: '→ explore', cls: 'demote' },
      { action: 'delete',         label: 'delete',    cls: 'danger' },
    ],
    stable: [
      { action: 'demote-canary', label: '→ canary', cls: 'demote' },
      { action: 'delete',        label: 'delete',   cls: 'danger' },
    ],
  };
  const safeKey = escHtml(key).replace(/'/g, "\\'");
  const btns = (actionDefs[status] || actionDefs.explore)
    .map(d => `<button class="act-btn ${d.cls}" onclick="onActionSelect('${d.action}','${safeKey}','${status}')">${d.label}</button>`)
    .join('');
  const cfClass = cf >= 2 ? 'warn' : '';
  const desc = p.description ? `<div class="pipeline-desc">${escHtml(p.description)}</div>` : '';
  const hideConn = opts && opts.hideConnector;
  return `
<div class="pipeline-card ${cf >= 2 ? 'critical' : status} ${isQueued ? 'queued' : ''}">
  <div class="pipeline-card-row">
    ${renderKeyParts(key, hideConn)}
    <span class="pipeline-badge badge-${status}">${status}${p.rollout_pct != null ? ' · ' + p.rollout_pct + '%' : ''}${p.synthesis_ready ? ' 💎' : ''}</span>
    <div class="pipeline-actions">${btns}</div>
  </div>
  ${desc}
  <div class="pipeline-metrics">
    <span>success: <b class="${parseFloat(sr) >= 0.95 ? 'good' : 'warn'}">${sr}</b></span>
    <span>verify: <b class="${parseFloat(vr) >= 0.95 ? 'good' : 'warn'}">${vr}</b></span>
    <span>failures: <b class="${cfClass}">${cf}</b></span>
    ${p.rollback_executed_count ? `<span>rollbacks: <b class="warn">${p.rollback_executed_count}</b></span>` : ''}
  </div>
</div>`;
}

// Render a section of pipeline cards grouped by connector
function renderPipelineGroup(pipelines, queuedKeys, opts) {
  const byConnector = groupByConnector(pipelines);
  let html = '';
  byConnector.forEach((ps, connector) => {
    const hue = connectorHue(connector);
    const style = connectorStyle(connector);
    html += `<div class="conn-group">
      <div class="conn-group-header">
        <span class="conn-group-name" style="${style}">${escHtml(connector)}</span>
        <span class="conn-group-count">${ps.length} pipeline${ps.length > 1 ? 's' : ''}</span>
      </div>`;
    ps.forEach(p => { html += renderPipelineCard(p, queuedKeys, { hideConnector: true, ...(opts || {}) }); });
    html += `</div>`;
  });
  return html;
}

function onActionSelect(action, key, currentStatus) {
  const actionMap = {
    'promote-canary': { label: 'Promote → canary', type: 'pipeline-set', fields: { status: 'canary', rollout_pct: 20 } },
    'promote-stable': { label: 'Promote → stable', type: 'pipeline-set', fields: { status: 'stable', rollout_pct: 100 } },
    'demote-explore': { label: 'Demote → explore', type: 'pipeline-set', fields: { status: 'explore', rollout_pct: 0 } },
    'demote-canary':  { label: 'Demote → canary',  type: 'pipeline-set', fields: { status: 'canary', rollout_pct: 20 } },
    'reset-failures': { label: 'Reset failures',   type: 'pipeline-set', fields: { consecutive_failures: 0 } },
    'delete':         { label: 'Delete pipeline',  type: 'pipeline-delete' },
  };
  const def = actionMap[action];
  if (!def) return;
  enqueue({
    id: ++queueIdSeq,
    type: def.type,
    label: def.label,
    subLabel: key,
    command: def.type === 'pipeline-delete'
      ? `pipeline-delete ${key}`
      : `pipeline-set ${key} ${JSON.stringify(def.fields)}`,
    data: def.type === 'pipeline-delete'
      ? { type: 'pipeline-delete', key }
      : { type: 'pipeline-set', key, fields: def.fields },
  });
}

// ── Scenario arg form ─────────────────────────────────────────────────────────
function toggleScenarioForm(formId, connector, scenarioName, requiredArgs) {
  const form = document.getElementById(formId);
  if (!form) return;
  if (form.style.display === 'block') {
    form.style.display = 'none';
    return;
  }
  const safeConnector = connector.replace(/'/g, "\\'");
  const safeScenario = scenarioName.replace(/'/g, "\\'");

  if (!requiredArgs || !requiredArgs.length) {
    // No args — enqueue immediately
    enqueue({
      id: ++queueIdSeq,
      type: 'scenario-run',
      label: `Run: ${scenarioName}`,
      subLabel: connector,
      command: `icc_exec intent=write.${connector}.apply-test scenario=${scenarioName}`,
      data: { type: 'scenario-run', connector, scenario: scenarioName, args: {} },
    });
    return;
  }

  let fieldsHtml = requiredArgs.map(arg => {
    const isSecret = ['token', 'password', 'secret', 'key'].some(s => arg.toLowerCase().includes(s));
    const placeholder = isSecret ? '(will be provided via CC)' : '';
    return `<div class="arg-row">
      <label>${escHtml(arg)}</label>
      <input type="text" data-arg="${escHtml(arg)}" class="${isSecret ? 'secret' : ''}" placeholder="${placeholder}" ${isSecret ? 'disabled' : ''} />
    </div>`;
  }).join('');

  form.innerHTML = `${fieldsHtml}
    <div class="scenario-form-actions">
      <button class="btn-sm" onclick="document.getElementById('${formId}').style.display='none'">Cancel</button>
      <button class="btn-sm" style="border-color:#58a6ff;color:#58a6ff" onclick="submitScenarioForm('${formId}','${safeConnector}','${safeScenario}')">▶ 加入队列</button>
    </div>`;
  form.style.display = 'block';
  const first = form.querySelector('input:not([disabled])');
  if (first) first.focus();
}

function submitScenarioForm(formId, connector, scenarioName) {
  const form = document.getElementById(formId);
  if (!form) return;
  const args = {};
  form.querySelectorAll('input[data-arg]').forEach(inp => {
    if (inp.disabled) {
      args[inp.dataset.arg] = '(provide via CC)';
    } else {
      args[inp.dataset.arg] = inp.value;
    }
  });
  form.style.display = 'none';
  enqueue({
    id: ++queueIdSeq,
    type: 'scenario-run',
    label: `Run: ${scenarioName}`,
    subLabel: connector,
    command: `icc_exec intent=write.${connector}.apply-test scenario=${scenarioName}`,
    data: { type: 'scenario-run', connector, scenario: scenarioName, args },
  });
}

// ── Action Queue ──────────────────────────────────────────────────────────────
function enqueue(item) {
  queue.push(item);
  renderQueue();
  if (currentTab === 'overview') renderOverviewTab();
}

function dequeue(id) {
  queue = queue.filter(q => q.id !== id);
  renderQueue();
  if (currentTab === 'overview') renderOverviewTab();
}

function clearQueue() {
  queue = [];
  renderQueue();
  if (currentTab === 'overview') renderOverviewTab();
}

function renderQueue() {
  const count = queue.length;
  document.getElementById('queue-count').textContent = count;
  const btn = document.getElementById('submit-btn');
  btn.disabled = count === 0;
  btn.textContent = `✓ 提交给 CC 执行 (${count})`;

  const container = document.getElementById('queue-items');
  if (!count) {
    container.innerHTML = '<div style="color:#484f58;font-size:11px;padding:8px">队列为空</div>';
    return;
  }
  container.innerHTML = queue.map(item => {
    const isDel = item.type === 'pipeline-delete';
    const isPromote = item.label.includes('stable') || item.label.includes('canary');
    const labelClass = isDel ? 'del' : isPromote ? 'promote' : '';
    return `<div class="queue-item ${isDel ? 'delete' : ''}">
      <div class="action-label">
        <b class="${labelClass}">${escHtml(item.label)}</b>
        <span>${escHtml(item.subLabel)}</span>
        <span style="color:#30363d;font-size:9px">${escHtml(item.command.slice(0, 50))}</span>
      </div>
      <button class="remove" onclick="dequeue(${item.id})" title="移除">✕</button>
    </div>`;
  }).join('');
}

async function submitQueue() {
  if (!queue.length) return;
  const actions = queue.map(q => q.data);
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  document.getElementById('status-msg').textContent = '提交中...';
  try {
    const r = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ actions }),
    });
    const result = await r.json();
    if (result.ok) {
      queue = [];
      renderQueue();
      document.getElementById('status-msg').textContent = `✓ 已提交 ${result.action_count} 条操作给 CC`;
      if (currentTab === 'overview') renderOverviewTab();
    } else {
      document.getElementById('status-msg').textContent = '提交失败: ' + JSON.stringify(result);
      btn.disabled = false;
    }
  } catch(e) {
    document.getElementById('status-msg').textContent = '网络错误: ' + e.message;
    btn.disabled = false;
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function resizeIframe(iframe) {
  try { iframe.style.height = iframe.contentDocument.body.scrollHeight + 'px'; } catch(e) {}
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
